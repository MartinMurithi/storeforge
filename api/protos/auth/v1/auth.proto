syntax = "proto3";

package api.auth.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

option go_package = "github.com/MartinMurithi/storeforge/api/protos/auth/v1;authv1";

// AuthService provides operations for managing user authentication and authorization.
service AuthService {

  // Register creates a new user account with the provided credentials and business information.
  rpc Register(RegisterRequest) returns (RegisterResponse){
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  };
  // Login authenticates a user and returns an access token.
  rpc Login(LoginRequest) returns (LoginResponse){
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  };
}

// It is an identity-level entity
message User {
  string                    id          = 1;
  string                    email       = 2;
  bool                      is_verified = 3;
  UserProfile               profile     = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp updated_at  = 6;
  google.protobuf.Timestamp deleted_at  = 7;
}

// UserProfile contains mutable, non-authentication user data.
message UserProfile {
  string full_name     = 1;
  string phone         = 2;
  string business_name = 3;
  string business_type = 4;
}

message RegisterRequest {
  string full_name     = 1;
  string email         = 2;
  string phone         = 3;
  string password      = 4;
  string business_name = 5;
  string business_type = 6;
}

message RegisterResponse {
  User   user    = 1;
  string message = 2;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  User  user  = 1;
  Token token = 2;
}

message Token {
  string                    access_token = 1;
  google.protobuf.Timestamp expires_at   = 2;
  int64                     expires_in   = 3; // seconds
  google.protobuf.Timestamp issued_at    = 4;
  string                    token_type   = 5; // "Bearer"
}
