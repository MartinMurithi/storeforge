syntax = "proto3";

package tenant.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

import "tenantmanagement/theme/v1/theme.proto";

option go_package = "github.com/MartinMurithi/storeforge/api/protos/tenantmanagement/tenant/v1;tenantv1";

// TenantService, tenant service will handle all thenant related operations such creating, retrieving, updating and deleting a tenant.
service TenantService {
    // Identity & Onboarding
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
}

message Tenant {
  string                    id            = 1;
  string                    store_name    = 2;
  string                    slug          = 3;
  string                    sub_domain    = 4;
  string                    business_type = 5;
  string                    status        = 6;
  google.protobuf.Timestamp created_at    = 7;
  google.protobuf.Timestamp updated_at    = 8;
  google.protobuf.Timestamp deleted_at    = 9;
}

message TenantSettings{
  string                    tenant_id    = 1;
  string                    theme_id     = 2;
  google.protobuf.Struct    theme_config = 3;
  int32                     version      = 4;
  google.protobuf.Timestamp updated      = 5;
}

message CreateTenantRequest {
  string store_name    = 1;
  string slug          = 2;
  string business_type = 3;
  string sub_domain    = 4;
  string theme_id      = 5;
}

message CreateTenantResponse {
  Tenant         tenant   = 1;
  theme.v1.Theme theme    = 2;
  TenantSettings settings = 3;
}

message GetTenantRequest {
  oneof identifier {
    string id   = 1;
    string slug = 2;
  }
}

message GetTenantResponse {
  Tenant tenant = 1;
}