syntax = "proto3";

package api.user.v1;

option go_package = "github.com/MartinMurithi/storeforge/api/protos/user/v1;userv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// UserService provides operations for managing user accounts and profiles.
service UserService{
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {};
  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse) {};
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {};
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {};
}

message User {
  string                    id          = 1;
  string                    email       = 2;
  bool                      is_verified = 3;
  UserProfile               profile     = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp updated_at  = 6;
  google.protobuf.Timestamp deleted_at  = 7;
}

// UserProfile contains mutable, non-authentication user data.
message UserProfile {
  string full_name     = 1;
  string phone         = 2;
}

message GetCurrentUserRequest{
  string id = 1;
}

message GetCurrentUserResponse{
  User user = 1;
}

message Pagination{
  int32 page  = 1;
  int32 limit = 2;
}

// Meta info for paginated response
message PaginationMeta {
  int32 page        = 1;
  int32 limit       = 2;
  int32 total       = 3;
  int32 total_pages = 4;
  bool  has_next    = 5;
  bool  has_prev    = 6;
}

message GetAllUsersRequest{
  int32 page  = 1;
  int32 limit = 2;
}

message GetAllUsersResponse{
  repeated User  users = 1;
  PaginationMeta meta  = 2;
}

message UpdateUserRequest {
  string          id            = 1;
  optional string email = 2;
  optional string phone = 3;
}

message UpdateUserResponse{
  User user = 1;
}

message DeleteUserRequest{
  string id = 1;
}

message DeleteUserResponse {
  string message = 1;
}