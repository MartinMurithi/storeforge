static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            # HTTP Connection Manager: manages HTTP requests
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO

                # Route configuration
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # Public login endpoint
                        - match:
                            prefix: "/v1/auth/login"
                          route:
                            cluster: auth_service
                        # All other endpoints require JWT
                        - match:
                            prefix: "/v1/"
                          route:
                            cluster: grpc_services

                # HTTP filters
                http_filters:
                  # 1️⃣ JWT Authentication
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        auth_provider:
                          issuer: "auth.storeforge"
                          jwks_uri: "http://auth-service:5000/.well-known/jwks.json"
                      rules:
                        - match:
                            prefix: "/v1/"
                          requires:
                            provider_name: auth_provider
                        - match:
                            prefix: "/v1/auth/login"
                          requires: {}

                  # 2️⃣ gRPC-JSON transcoder
                  - name: envoy.filters.http.grpc_json_transcoder
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                      proto_descriptor: "/etc/envoy/proto/api.pb"
                      services: [
                        "storeforge.auth.v1.AuthService",
                        "storeforge.user.v1.UserService",
                        "storeforge.payment.v1.PaymentService"
                      ]
                      print_options:
                        add_whitespace: true
                        always_output: true

                  # 3️⃣ Router filter (forwards requests to cluster)
                  - name: envoy.filters.http.router

  clusters:
    # Auth service cluster
    - name: auth_service
      connect_timeout: 0.25s
      type: strict_dns
      http2_protocol_options: {}
      lb_policy: round_robin
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-service
                      port_value: 50051

    # All other gRPC services
    - name: grpc_services
      connect_timeout: 0.25s
      type: strict_dns
      http2_protocol_options: {}
      lb_policy: round_robin
      load_assignment:
        cluster_name: grpc_services
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: user-service
                      port_value: 50051
              - endpoint:
                  address:
                    socket_address:
                      address: payment-service
                      port_value: 50051