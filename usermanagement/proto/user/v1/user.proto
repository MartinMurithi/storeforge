syntax = "proto3";

package storeforge.user.v1;

option go_package = "github.com/storeforge/usermanagement/proto/user/v1;userv1";

import "google/protobuf/timestamp.proto";

// It is an identity-level entity, not a domain aggregate.
message User {
  string                    id            = 1;
  string                    email         = 2;
  string                    password_hash = 3;
  bool                      is_verified   = 4;
  UserProfile               profile       = 5;
  google.protobuf.Timestamp created_at    = 6;
  google.protobuf.Timestamp updated_at    = 7;
  google.protobuf.Timestamp deleted_at    = 8;
}

// UserService provides operations for managing user accounts and profiles.
service UserService{
  // GetUserById retrieves a user by their unique identifier.
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {};
}

// UserProfile contains mutable, non-authentication user data.
message UserProfile {
  string full_name     = 1;
  string phone         = 2;
  string business_name = 3;
  string business_type = 4;
}

message GetUserByIdRequest{
  string id = 1;
}

message UserResponse{
  string                    id          = 1;
  string                    email       = 2;
  bool                      is_verified = 3;
  UserProfile               profile     = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp updated_at  = 6;
  google.protobuf.Timestamp deleted_at  = 7;
}

message GetUserByIdResponse{
  UserResponse user = 1;
}