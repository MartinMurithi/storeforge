syntax = "proto3";

package storeforge.user.v1;

option go_package = "github.com/storeforge/usermanagement/proto/user/v1;userv1";

import "google/protobuf/timestamp.proto";

// UserService provides operations for managing user accounts and profiles.
service UserService{
  // GetCurrentUser retrieves a user by their unique identifier.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {};
  // GetAllUsers retrieves all users with pagination support.
  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse) {};
  // UpdateUser updates an existing user's profile information.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {};
  // DeleteUser soft deletes a user account.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {};

}

message User {
  string                    id            = 1;
  string                    email         = 2;
  bool                      is_verified   = 3;
  UserProfile               profile       = 4;
  google.protobuf.Timestamp created_at    = 5;
  google.protobuf.Timestamp updated_at    = 6;
  google.protobuf.Timestamp deleted_at    = 7;
}

// UserProfile contains mutable, non-authentication user data.
message UserProfile {
  string full_name     = 1;
  string phone         = 2;
  string business_name = 3;
  string business_type = 4;
}

message GetCurrentUserRequest{
  string id = 1;
}

message UserResponse{
  string                    id          = 1;
  string                    email       = 2;
  bool                      is_verified = 3;
  UserProfile               profile     = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp updated_at  = 6;
  google.protobuf.Timestamp deleted_at  = 7;
}

message GetCurrentUserResponse{
  UserResponse user = 1;
}

message Pagination{
  int32 page  = 1;
  int32 limit = 2;
}

message GetAllUsersRequest{
  Pagination pagination = 1;
}

message GetAllUsersResponse{
  repeated UserResponse user = 1;
}

message UpdateUserRequest {
  string id            = 1;
  string business_name = 2;
  string business_type = 3;
}

message UpdateUserResponse{
  UserResponse user = 1;
}

message DeleteUserRequest{
  string id = 1;
}

message DeleteUserResponse {
  string message = 1;
}